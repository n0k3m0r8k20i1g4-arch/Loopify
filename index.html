<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Loopify</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }
    .container {
      max-width: 600px;
      margin: auto;
    }
    .track {
      background: #1e1e1e;
      padding: 10px;
      margin: 10px;
      cursor: pointer;
      border-radius: 10px;
    }
    button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Loopify</h1>

  <!-- 簡易アンケート -->
  <h3>今の気分は？</h3>
  <button onclick="setMood('focus')">集中</button>
  <button onclick="setMood('relax')">リラックス</button>

  <h3>おすすめ</h3>
  <div id="tracks"></div>

  <audio id="player" controls></audio>
</div>

<script>
let mood = "focus";

const musicData = [
  {
    title: "Lo-fi Focus",
    mood: "focus",
    src: "music1.mp3"
  },
  {
    title: "Chill Relax",
    mood: "relax",
    src: "music2.mp3"
  }
];

function setMood(selected) {
  mood = selected;
  renderTracks();
}

function renderTracks() {
  const container = document.getElementById("tracks");
  container.innerHTML = "";

  const filtered = musicData.filter(track => track.mood === mood);

  filtered.forEach(track => {
    const div = document.createElement("div");
    div.className = "track";
    div.innerText = track.title;
    div.onclick = () => play(track.src);
    container.appendChild(div);
  });
}

function play(src) {
  const player = document.getElementById("player");
  player.src = src;
  player.play();
}

// 初期表示
renderTracks();
</script>

</body>
</html>
